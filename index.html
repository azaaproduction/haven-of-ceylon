
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HOC Hub</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#071019;

color:white;

}

header{

background:linear-gradient(135deg,#00b894,#0984e3);

padding:40px 20px;

text-align:center;

}

header h1{

font-size:38px;

font-weight:700;

}

header p{

margin-top:10px;

opacity:.9;

}

.container{

width:95%;

max-width:1200px;

margin:auto;

padding:25px;

}

.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:20px;

}

.card{

background:#111c2c;

border-radius:18px;

padding:25px;

transition:.3s;

cursor:pointer;

}

.card:hover{

transform:translateY(-8px);

background:#16263c;

}

.card h2{

margin-bottom:10px;

}

.card p{

opacity:.8;

line-height:1.6;

}

footer{

padding:30px;

text-align:center;

opacity:.7;

}

</style>

</head>

<body>

<header>

<h1>HOC HUB</h1>

<p>One Place For Every Update</p>

</header>

<div class="container">

<div class="grid">

<div class="card">

<h2>MOJU APP</h2>

<p>Latest updates and events.</p>

</div>

<div class="card">

<h2>HIFAMI APP</h2>

<p>Official information and guides.</p>

</div>

<div class="card">

<h2>Topup Details</h2>

<p>Payment instructions and support.</p>

</div>

<div class="card">

<h2>Contact Us</h2>

<p>Need help? Contact HOC Team.</p>

</div>

</div>

</div>

<footer>

© 2026 HOC Hub

</footer>

</body>
</html>
